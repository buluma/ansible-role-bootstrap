---
# vars file for bootstrap

# Define the search string for some distributions.
# Some distributions use a slightly different name in /etc/os-release.
_bootstrap_os_family:
  Archlinux: Arch Linux
  CentOS: CentOS
  Debian: Debian
  Fedora: Fedora
  OracleLinux: Oracle Linux
  RedHat: Red Hat
  Rocky: Rocky
  Suse: Suse
  Ubuntu: Ubuntu

bootstrap_os_family: >-
  {{ _bootstrap_os_family[ansible_facts['os_family']] |
  default(ansible_facts['os_family']) }}

bootstrap_distribution: >-
  {{ _bootstrap_os_family[ansible_facts['distribution']] |
  default(ansible_facts['distribution']) }}

bootstrap_distribution_major_version: >-
  {{ ansible_facts['distribution_major_version'] |
  default(ansible_facts['distribution_version']) }}

_bootstrap_packages:
  Debian:
    - python3-apt
    - python3-pycurl
    - sudo
  RedHat:
    - python3-libdnf5
    - sudo
  Suse:
    - python3-base
    - sudo
  Alpine:
    - python3
    - sudo
  Archlinux:
    - python3
    - sudo

# Map the right set of packages, based on gathered ansible facts.
bootstrap_facts_packages: >-
  {{ _bootstrap_packages[ansible_facts['distribution'] ~ '_' ~ ansible_facts['distribution_major_version']] |
  default(_bootstrap_packages[ansible_facts['distribution']]) |
  default(_bootstrap_packages[ansible_facts['os_family']]) }}

_bootstrap_install:
  default: true
  Container: false

bootstrap_install: >-
  {{ _bootstrap_install[ansible_facts['virtualization_type']] |
  default(_bootstrap_install['default']) }}

_bootstrap_search:
  Archlinux: "Arch Linux"
  OracleLinux: "Oracle Linux"
  RedHat: "Red Hat"

bootstrap_search: "{{ _bootstrap_search }}"
